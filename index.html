<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>명함첩</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ── Screen: 명함 목록 (Home) ── -->
    <section class="screen active" id="screen-home">
      <header class="screen-header">
        <div>
          <h1 class="app-title">명함첩</h1>
          <p class="app-subtitle">Card Collection</p>
        </div>
        <span class="card-count" id="card-count">0장</span>
      </header>
      <div class="card-grid" id="card-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">◈</div>
          <p>저장된 명함이 없습니다</p>
          <p class="empty-sub">아래 + 버튼으로 첫 명함을 추가하세요</p>
        </div>
      </div>
    </section>

    <!-- ── Screen: 명함 스캔/추가 ── -->
    <section class="screen" id="screen-scan">
      <header class="screen-header">
        <button class="btn-back" id="btn-back-scan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <h2 class="screen-title">명함 스캔</h2>
      </header>

      <div class="scan-area">
        <div class="camera-frame" id="camera-frame">
          <video id="camera-video" autoplay playsinline muted></video>
          <div class="camera-overlay">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
            <div class="scan-line"></div>
          </div>
          <canvas id="camera-canvas" style="display:none"></canvas>
        </div>
        <div class="scan-actions">
          <button class="btn-gallery" id="btn-gallery" title="갤러리에서 선택">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
          </button>
          <button class="btn-capture" id="btn-capture" aria-label="촬영">
            <div class="capture-ring"></div>
            <div class="capture-dot"></div>
          </button>
          <div style="width:44px"></div>
        </div>
        <!-- capture="environment" → iOS에서 카메라 직접 실행 -->
        <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">
      </div>

      <div class="form-panel" id="form-panel">
        <div class="ocr-status" id="ocr-status"></div>
        <form id="card-form">
          <div class="form-section">
            <h3 class="form-section-title">인물 정보</h3>
            <div class="field-group">
              <input type="text" id="field-name" placeholder="이름" class="field-input">
              <label class="field-label" for="field-name">이름</label>
            </div>
            <div class="field-group">
              <input type="text" id="field-company" placeholder="회사" class="field-input">
              <label class="field-label" for="field-company">회사</label>
            </div>
            <div class="field-group">
              <input type="text" id="field-position" placeholder="직책" class="field-input">
              <label class="field-label" for="field-position">직책</label>
            </div>
            <div class="field-group">
              <input type="tel" id="field-phone" placeholder="전화번호" class="field-input">
              <label class="field-label" for="field-phone">전화번호</label>
            </div>
            <div class="field-group">
              <input type="email" id="field-email" placeholder="이메일" class="field-input">
              <label class="field-label" for="field-email">이메일</label>
            </div>
            <div class="field-group">
              <input type="text" id="field-address" placeholder="주소" class="field-input">
              <label class="field-label" for="field-address">주소</label>
            </div>
          </div>

          <div class="form-section">
            <h3 class="form-section-title">만남 정보</h3>
            <div class="field-group">
              <input type="text" id="field-met-location" placeholder="만난 장소" class="field-input">
              <label class="field-label" for="field-met-location">만난 장소</label>
            </div>
            <div class="field-group">
              <input type="datetime-local" id="field-met-datetime" class="field-input">
              <label class="field-label always-top" for="field-met-datetime">만난 일시</label>
            </div>
            <div class="field-group">
              <textarea id="field-met-reason" placeholder="만난 이유 / 메모" class="field-input field-textarea"></textarea>
              <label class="field-label" for="field-met-reason">메모</label>
            </div>
            <div class="gps-info" id="gps-info">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="12">
                <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
              </svg>
              <span id="gps-text">위치 감지 중...</span>
            </div>
          </div>

          <button type="submit" class="btn-primary">저장하기</button>
        </form>
      </div>
    </section>

    <!-- ── Screen: 명함 상세 ── -->
    <section class="screen" id="screen-detail">
      <header class="screen-header">
        <button class="btn-back" id="btn-back-detail">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <h2 class="screen-title">명함 상세</h2>
        <div class="header-actions">
          <button class="btn-icon-gold" id="btn-edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="btn-icon-danger" id="btn-delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="detail-card" id="detail-card"></div>

      <div class="detail-actions">
        <button class="action-btn" id="btn-vcard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          연락처 저장
        </button>
        <button class="action-btn" id="btn-email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          인사 이메일
        </button>
      </div>
    </section>

    <!-- ── Screen: 명함 수정 ── -->
    <section class="screen" id="screen-edit">
      <header class="screen-header">
        <button class="btn-back" id="btn-back-edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <h2 class="screen-title">명함 수정</h2>
      </header>
      <div class="form-panel">
        <form id="edit-form">
          <div class="form-section">
            <h3 class="form-section-title">인물 정보</h3>
            <div class="field-group">
              <input type="text" id="edit-name" placeholder="이름" class="field-input">
              <label class="field-label" for="edit-name">이름</label>
            </div>
            <div class="field-group">
              <input type="text" id="edit-company" placeholder="회사" class="field-input">
              <label class="field-label" for="edit-company">회사</label>
            </div>
            <div class="field-group">
              <input type="text" id="edit-position" placeholder="직책" class="field-input">
              <label class="field-label" for="edit-position">직책</label>
            </div>
            <div class="field-group">
              <input type="tel" id="edit-phone" placeholder="전화번호" class="field-input">
              <label class="field-label" for="edit-phone">전화번호</label>
            </div>
            <div class="field-group">
              <input type="email" id="edit-email" placeholder="이메일" class="field-input">
              <label class="field-label" for="edit-email">이메일</label>
            </div>
            <div class="field-group">
              <input type="text" id="edit-address" placeholder="주소" class="field-input">
              <label class="field-label" for="edit-address">주소</label>
            </div>
          </div>
          <div class="form-section">
            <h3 class="form-section-title">만남 정보</h3>
            <div class="field-group">
              <input type="text" id="edit-met-location" placeholder="만난 장소" class="field-input">
              <label class="field-label" for="edit-met-location">만난 장소</label>
            </div>
            <div class="field-group">
              <input type="datetime-local" id="edit-met-datetime" class="field-input">
              <label class="field-label always-top" for="edit-met-datetime">만난 일시</label>
            </div>
            <div class="field-group">
              <textarea id="edit-met-reason" placeholder="만난 이유 / 메모" class="field-input field-textarea"></textarea>
              <label class="field-label" for="edit-met-reason">메모</label>
            </div>
          </div>
          <button type="submit" class="btn-primary">수정 완료</button>
        </form>
      </div>
    </section>

    <!-- ── Screen: 내 프로필 ── -->
    <section class="screen" id="screen-profile">
      <header class="screen-header">
        <button class="btn-back" id="btn-back-profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <h2 class="screen-title">내 프로필</h2>
      </header>

      <form id="profile-form" class="profile-form">
        <div class="profile-avatar">
          <div class="avatar-circle" id="avatar-initials">?</div>
        </div>
        <div class="form-section">
          <h3 class="form-section-title">내 정보</h3>
          <div class="field-group">
            <input type="text" id="profile-name" placeholder="이름" class="field-input">
            <label class="field-label" for="profile-name">이름</label>
          </div>
          <div class="field-group">
            <input type="email" id="profile-email" placeholder="이메일" class="field-input">
            <label class="field-label" for="profile-email">이메일</label>
          </div>
          <div class="field-group">
            <input type="tel" id="profile-phone" placeholder="전화번호" class="field-input">
            <label class="field-label" for="profile-phone">전화번호</label>
          </div>
          <div class="field-group">
            <input type="text" id="profile-company" placeholder="회사" class="field-input">
            <label class="field-label" for="profile-company">회사</label>
          </div>
          <div class="field-group">
            <input type="text" id="profile-position" placeholder="직책" class="field-input">
            <label class="field-label" for="profile-position">직책</label>
          </div>
        </div>

        <div class="form-section">
          <h3 class="form-section-title">EmailJS 설정</h3>
          <div class="field-group">
            <input type="text" id="profile-emailjs-service" placeholder="Service ID" class="field-input">
            <label class="field-label" for="profile-emailjs-service">Service ID</label>
          </div>
          <div class="field-group">
            <input type="text" id="profile-emailjs-template" placeholder="Template ID" class="field-input">
            <label class="field-label" for="profile-emailjs-template">Template ID</label>
          </div>
          <div class="field-group">
            <input type="text" id="profile-emailjs-key" placeholder="Public Key" class="field-input">
            <label class="field-label" for="profile-emailjs-key">Public Key</label>
          </div>
        </div>

        <button type="submit" class="btn-primary">저장</button>
      </form>
    </section>

  </div>

  <!-- FAB — #app 밖에 위치 (iOS fixed 버그 방지) -->
  <button class="fab" id="btn-add-card" aria-label="명함 추가">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <!-- Bottom Navigation — #app 밖에 위치 -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-screen="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>명함첩</span>
    </button>
    <button class="nav-item" data-screen="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 21v-2a4 4 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>내 프로필</span>
    </button>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Loading -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loading-text">처리 중...</p>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
